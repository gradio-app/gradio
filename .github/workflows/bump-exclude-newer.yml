name: Bump uv exclude-newer date

on:
  schedule:
    # Every other Monday at 9am UTC
    - cron: "0 9 */14 * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute new date
        id: date
        run: |
          NEW_DATE="$(date -u +%Y-%m-%dT23:59:59-07:00)"
          echo "new_date=$NEW_DATE" >> "$GITHUB_OUTPUT"

      - name: Update exclude-newer date everywhere
        env:
          NEW_DATE: ${{ steps.date.outputs.new_date }}
        run: |
          # Match the timestamp pattern used across the repo
          OLD_PATTERN='[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}T23:59:59-07:00'

          sed -i "s|${OLD_PATTERN}|${NEW_DATE}|g" \
            pyproject.toml \
            .github/actions/install-all-deps/action.yml \
            .github/workflows/test-python.yml \
            .github/workflows/test-functional.yml \
            .github/workflows/frontend_profiling.yml \
            scripts/create_test_requirements.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bump-exclude-newer
          commit-message: "Bump uv exclude-newer to ${{ steps.date.outputs.new_date }}"
          title: "Bump uv exclude-newer to ${{ steps.date.outputs.new_date }}"
          body: |
            Automated bump of the `uv exclude-newer` date so CI tests against newer dependency versions.

            If CI passes, this is safe to merge. If it fails, a dependency update broke something — investigate before merging.
          labels: dependencies
